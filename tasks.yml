extends:
  - ./build/docker.tasks.yml
tasks:
  clean: rimraf ./dist
  fresh: clean -- ./node_modules ./package-lock.json
  bundle: [clean, lint, node ./build/esbuild.js]
  bundle:dev: [env: { BUNDLE_DEV: true }, bundle]
  bundle:test: [env: { BUNDLE_TEST: true }, bundle]
  compile: [clean, tsgo]
  lint: tsgo --noEmit
  test: [compile, env: { TEST_HEADLESS: true }, node --enable-source-maps --experimental-test-coverage dist/test/runner.js]
  test:vscode: [bundle:test, node test/vscode.runner.js]
  test:insiders: [bundle:test, env: { TEST_INSIDERS: true }, node ./test/vscode.runner.js]
  test:bundle: [bundle:test, env: { TEST_HEADLESS: true }, node dist/bundled.test.js]
  coverage: [
    compile,
    env: { TEST_HEADLESS: true },
    node --enable-source-maps --experimental-test-coverage
      --test-reporter=spec --test-reporter-destination=stdout
      --test-reporter=junit --test-reporter-destination=./coverage.xml 
      --test-coverage-exclude=dist/test/**/*.js
      --test dist/test/runner.js
  ]
  trace: [clean, tsgo --explainFiles --project ./tsconfig.json > trace.log]