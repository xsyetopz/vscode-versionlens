extends:
  - ./build/test/docker.test.tasks.yml
  - ./build/package/docker.package.tasks.yml
  - ./build/preview/docker.preview.tasks.yml
tasks:
  clean: rimraf ./dist
  fresh: clean -- ./node_modules ./package-lock.json
  bundle: [clean, lint, node ./build/esbuild.js]
  bundle:dev: [env: { BUNDLE_DEV: true }, bundle]
  bundle:test: [env: { BUNDLE_TEST: true }, bundle]
  compile: [clean, tsc]
  coverage: c8 -r=text -r=cobertura -r=text-summary -o .coverage task test
  lint: tsc --noEmit
  test: [compile, env: { TEST_HEADLESS: true }, node ./dist/test/runner.js]
  test:vscode: [bundle:test, node ./test/vscode.runner.js]
  test:insiders: [bundle:test, env: { TEST_INSIDERS: true }, node ./test/vscode.runner.js]
  build:test: [bundle:test, env: { TEST_HEADLESS: true }, node ./dist/bundled.test.js]
  trace: [clean, tsc --explainFiles --project ./tsconfig.json > trace.log]