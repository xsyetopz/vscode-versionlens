name: JetBrains CI/CD

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jetbrains:
    name: JetBrains plugin
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        shell: bash
        run: |
          channel=$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)
          rustup toolchain install "$channel" --profile minimal
          rustup default "$channel"

      - name: Cache Cargo registry and language server build
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-jetbrains-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-jetbrains-
            ${{ runner.os }}-cargo-

      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: current

      - name: Check and build JetBrains plugin
        run: gradle -p packages/jetbrains-plugin check buildPlugin --stacktrace

      - name: Upload JetBrains artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: versionlens-redux-jetbrains-plugin
          path: packages/jetbrains-plugin/build/distributions/*.zip
          if-no-files-found: error
