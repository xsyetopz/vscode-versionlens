name: Release VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        shell: bash
        run: |
          channel=$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)
          rustup toolchain install "$channel" --profile minimal --component clippy --component rustfmt
          rustup default "$channel"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build VSIX
        run: bun run package

      - name: Check VSIX freshness
        run: bun run check:vsix-freshness

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: vscode-versionlens-vsix
          path: packages/vscode-extension/*.vsix
          if-no-files-found: error

      - name: Attach VSIX to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: packages/vscode-extension/*.vsix
