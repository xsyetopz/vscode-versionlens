var:
  DOCKER_FILE_PATH: ./build/docker
tasks:
  # unit tests
  docker:test:
    - var:
        TEST_IMAGE: versionlens:tests
        COVERAGE_VOL: $PWD/.coverage:/versionlens/.coverage
    - docker build -t $TEST_IMAGE -f $DOCKER_FILE_PATH/test.dockerfile .
    - docker run --rm -v $COVERAGE_VOL --name test-container $TEST_IMAGE

  # package vsix file
  docker:package:
    - var:
        PACKAGE_IMAGE: versionlens:package
        PACKAGE_VOL: $PWD/.package:/versionlens/.package
    - docker build -t $PACKAGE_IMAGE -f $DOCKER_FILE_PATH/package.dockerfile .
    - docker run --rm -v $PACKAGE_VOL --name test-container $PACKAGE_IMAGE

  # publish to the marketplace
  docker:publish:
    - var:
        PUBLISH_IMAGE: versionlens:publish
        PUBLISH_VOL: $PWD/.publish:/versionlens/.publish
    - docker build -t $PUBLISH_IMAGE -f $DOCKER_FILE_PATH/publish.dockerfile .
    - docker run --rm -v $PUBLISH_VOL --env-file ./.env --name publish-container $PUBLISH_IMAGE

  # strip '-prerelease' from the version in the package.json
  prerelease:prepack: node -e "
    const pkg = require('./package.json');
    const { writeFileSync } = require('fs');
    pkg.version = pkg.version.replace('-prerelease', '');
    writeFileSync('./package.json', JSON.stringify(pkg,null,'  '));"

  # publish a pre-release to ms marketplace
  docker:prerelease:vsce:
    - var:
        PRERELEASE_IMAGE: versionlens:prerelease-vsce
        PRERELEASE_VOL: $PWD/.prerelease-vsce:/versionlens/.prerelease
    - docker build -t $PRERELEASE_IMAGE -f $DOCKER_FILE_PATH/prerelease.vsce.dockerfile .
    - docker run --rm -v $PRERELEASE_VOL --env-file ./.env --name prerelease-vsce-container $PRERELEASE_IMAGE

  # publish a pre-release to ovsx
  docker:prerelease:ovsx:
    - var:
        PRERELEASE_IMAGE: versionlens:prerelease-ovsx
        PRERELEASE_VOL: $PWD/.prerelease-ovsx:/versionlens/.prerelease
    - docker build -t $PRERELEASE_IMAGE -f $DOCKER_FILE_PATH/prerelease.ovsx.dockerfile .
    - docker run --rm -v $PRERELEASE_VOL --env-file ./.env --name prerelease-osvx-container $PRERELEASE_IMAGE
