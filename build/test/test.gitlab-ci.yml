image: docker:stable

services:
  - docker:dind

workflow:
  rules:
    - when: always

before_script:
  - docker build -t versionlens:tests -f ./build/test/test.dockerfile .

unit_tests:
  script:
    - docker run --rm -v $PWD/.coverage:/versionlens/.coverage --name test-container versionlens:tests
  coverage: '/Branches\s+:\s(.+)%/'
  artifacts:
    paths: 
      - .coverage/cobertura-coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: .coverage/cobertura-coverage.xml