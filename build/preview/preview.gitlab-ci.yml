image: docker:dind
services: [docker:dind]

before_script:
  - apk update && apk upgrade
  - apk add nodejs npm
  - npm install js-build-tasks -g

workflow:
  rules:
    - when: always

preview:
  script:
    - cp $VSCE_PAT_FILEPATH .env
    - task docker:preview
    - mv ./artifacts/*.vsix .
  artifacts:
    paths:
      - ./*.vsix
