image: docker:dind
services: [docker:dind]

before_script:
  - apk update && apk upgrade
  - apk add nodejs npm
  - npm install js-build-tasks -g

workflow:
  rules:
    - when: always

unit_tests:
  script: [task docker:test]
  coverage: '/all files\s+\|\s+\d+\.?\d+\s+\|\s+(\d+\.?\d+)/'
  artifacts:
    paths: [coverage.xml]
    reports:
      junit: coverage.xml
  rules:
    - if: $IS_TEST == "1"

package:
  script: [task docker:package]
  artifacts:
    paths:
      - .package/*.vsix
  rules:
    - if: $IS_PACKAGE == "1"

prerelease:vsce:
  script:
    - cp $VSCE_PAT_FILEPATH .env
    - task docker:prerelease:vsce
  artifacts:
    paths:
      - .prerelease-vsce/*.vsix
  rules:
    - if: $IS_PRERELEASE == "1"

prerelease:ovsx:
  script:
    - cp $OVSX_PAT_FILEPATH .env
    - task docker:prerelease:ovsx
  artifacts:
    paths:
      - .prerelease-ovsx/*.vsix
  rules:
    - if: $IS_PRERELEASE == "1"

publish:vsce:
  script:
    - cp $VSCE_PAT_FILEPATH .env
    - task docker:publish:vsce
  artifacts:
    paths:
      - .publish-vsce/*.vsix
  rules:
    - if: $IS_PUBLISH == "1"

publish:ovsx:
  script:
    - cp $OVSX_PAT_FILEPATH .env
    - task docker:publish:ovsx
  artifacts:
    paths:
      - .publish-ovsx/*.vsix
  rules:
    - if: $IS_PUBLISH == "1"